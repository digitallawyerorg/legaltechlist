# PostgreSQL. Versions 8.2 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On OS X with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On OS X with MacPorts:
#   gem install pg -- --with-pg-config=/opt/local/lib/postgresql84/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem 'pg'
#
default: &default
  adapter: postgresql
  encoding: unicode
  # Large enough for the Solid Queue worker (needs ~JOB_THREADS + a few reserved
  # connections for the dispatcher/heartbeat) as well as Puma on the web dyno.
  pool: <%= [ENV.fetch("RAILS_MAX_THREADS", 5).to_i, ENV.fetch("JOB_THREADS", 3).to_i + 3].max %>

development:
  <<: *default
  database: legaltechlist_development

test:
  <<: *default
  database: legaltechlist_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
